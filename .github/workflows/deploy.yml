name: Deploy 秘書室 to GitHub Pages

# app/ ディレクトリをサイトのルートとして公開する。
# 公開URL例：https://hirofumiy.github.io/hisho-app/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload app/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
